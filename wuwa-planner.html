<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resonance Ledger — Wuthering Waves Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0E16; --panel:#121828; --panel2:#0E1420; --line:#232C42; --line2:#2E3A57;
  --ink:#E9EDF6; --mut:#8A93AB; --faint:#5A6379;
  --gold:#E5B566; --cyan:#5FD9E4; --vio:#A78BFA; --green:#7BD88F; --red:#E5737B;
  --r2:#69B876; --r3:#5CA8DE; --r4:#A67FE0; --r5:#E5B566;
  --spectro:#F0DB6B; --glacio:#7FD8F0; --fusion:#F2836B; --electro:#B980F0;
  --aero:#5BE0AE; --havoc:#E86BA8; --weapon:#9DB4D0;
}
*{box-sizing:border-box; margin:0; padding:0}
/* author display rules (e.g. .dot{display:inline-block}) would otherwise beat
   the UA's [hidden] rule — this keeps hidden fallback dots actually hidden */
[hidden]{display:none !important}
html{scrollbar-color:var(--line2) var(--bg)}
body{
  background:var(--bg); color:var(--ink);
  font-family:'IBM Plex Sans',system-ui,sans-serif; font-size:14px; line-height:1.45;
  background-image:radial-gradient(1200px 500px at 80% -10%, rgba(95,217,228,.06), transparent 60%),
                   radial-gradient(900px 400px at 10% 110%, rgba(229,181,102,.05), transparent 60%);
  min-height:100vh;
}
h1,h2,h3,.disp{font-family:'Chakra Petch',system-ui,sans-serif; letter-spacing:.02em}
.num{font-variant-numeric:tabular-nums}
.wrap{max-width:1340px; margin:0 auto; padding:20px 16px 80px}

/* ── header ─────────────────────────────── */
header{margin-bottom:22px}
.eyebrow{color:var(--cyan); font-size:11px; text-transform:uppercase; letter-spacing:.22em; font-weight:600}
h1{font-size:28px; font-weight:700; margin:2px 0 0}
h1 .thin{color:var(--mut); font-weight:500}
.wave{display:block; margin-top:6px; width:260px; height:14px}
.wave path{stroke:var(--cyan); stroke-width:1.6; fill:none; opacity:.85}
@media (prefers-reduced-motion: no-preference){
  .wave path{stroke-dasharray:340; stroke-dashoffset:340; animation:trace 1.6s ease-out forwards}
  @keyframes trace{to{stroke-dashoffset:0}}
}
.toolbar{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; align-items:center}
.spacer{flex:1}
.storage-note{font-size:12px; color:var(--faint); margin-top:8px}
.storage-note.warn{color:var(--gold)}

/* ── buttons & inputs ───────────────────── */
button{
  font-family:'Chakra Petch',sans-serif; font-weight:600; font-size:12.5px; letter-spacing:.04em;
  color:var(--ink); background:var(--panel); border:1px solid var(--line2);
  padding:7px 13px; border-radius:7px; cursor:pointer; transition:border-color .15s, background .15s;
}
button:hover{border-color:var(--cyan)}
button:focus-visible, select:focus-visible, input:focus-visible{outline:2px solid var(--cyan); outline-offset:1px}
button.primary{background:linear-gradient(180deg,#1B2A46,#152238); border-color:#3B577F}
button.primary:hover{border-color:var(--cyan)}
button.ghost{background:transparent; border-color:var(--line)}
button.tiny{padding:3px 8px; font-size:11.5px; border-radius:6px}
button.danger:hover{border-color:var(--red); color:var(--red)}
button.good{color:var(--green)} button.good:hover{border-color:var(--green); color:var(--green)}
button:disabled{opacity:.35; cursor:default}
button:disabled:hover{border-color:var(--line2)}
select,input[type=number]{
  background:var(--panel2); color:var(--ink); border:1px solid var(--line2); border-radius:6px;
  padding:4px 6px; font:inherit; font-size:13px;
}
input[type=number]{width:86px; text-align:right; font-variant-numeric:tabular-nums}
input[type=number]::-webkit-inner-spin-button{opacity:.5}
label.chk{display:inline-flex; gap:6px; align-items:center; cursor:pointer; color:var(--mut); font-size:12.5px}

/* ── layout ─────────────────────────────── */
.cols{display:grid; grid-template-columns:minmax(0,5fr) minmax(0,7fr); gap:18px; align-items:start}
@media(max-width:940px){.cols{grid-template-columns:1fr} .cols>section{order:-1}}
.panel{background:var(--panel); border:1px solid var(--line); border-radius:12px}
.panel-h{display:flex; align-items:baseline; gap:10px; padding:14px 16px 10px; border-bottom:1px solid var(--line)}
.panel-h h2{font-size:15px; text-transform:uppercase; letter-spacing:.12em; color:var(--ink)}
.panel-h .sub{font-size:12px; color:var(--faint)}
.panel-b{padding:14px 16px}
.sticky{position:sticky; top:14px}
@media(max-width:940px){.sticky{position:static}}

/* ── goal cards: 2-per-row grid of read-only status views ── */
#goals{display:grid; grid-template-columns:repeat(auto-fill, minmax(min(330px,100%), 1fr)); gap:12px; align-items:start}
#goals>.empty{grid-column:1/-1}
.goal{border:1px solid var(--line); border-radius:10px; background:var(--panel2); overflow:hidden}
.goal-mats{border-top:1px dashed var(--line); padding:4px 12px 10px}
.goal.dragging{opacity:.45}
.goal.drop-before{box-shadow:0 -2px 0 var(--cyan)}
.goal.drop-after{box-shadow:0 2px 0 var(--cyan)}
.grip{cursor:grab; color:var(--faint); font-size:15px; padding:2px 3px; user-select:none; touch-action:none}
.grip:active{cursor:grabbing}
.goal-top{display:flex; align-items:center; gap:12px; padding:10px 12px}
.prio{font-family:'Chakra Petch'; font-weight:700; font-size:12px; color:var(--acc,var(--cyan)); width:26px; text-align:center}
.avatar{width:40px; height:40px; border-radius:9px; display:grid; place-items:center;
  font-family:'Chakra Petch'; font-weight:700; font-size:15px; color:#0A0E16; flex:none;
  box-shadow:0 0 0 1px rgba(255,255,255,.12) inset; position:relative; overflow:hidden}
.avatar-img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:inherit}
.ico-wrap{display:inline-flex; width:22px; height:22px; margin-right:8px; vertical-align:-6px;
  align-items:center; justify-content:center}
.ico-wrap img{width:22px; height:22px; object-fit:contain; border-radius:5px}
.ico-wrap .dot{margin-right:0}
#addMenu button img{width:18px; height:18px; vertical-align:-4px; margin-right:6px; border-radius:4px}
.gname{font-family:'Chakra Petch'; font-weight:600; font-size:15px}
.gmeta{font-size:11.5px; color:var(--mut)}
.badge{display:inline-block; font-size:10px; font-weight:700; letter-spacing:.08em; padding:1px 6px;
  border-radius:4px; border:1px solid var(--gold); color:var(--gold); vertical-align:1px; margin-left:6px}
.gctrl{margin-left:auto; display:flex; gap:5px}
.grid-ct{display:grid; grid-template-columns:1fr auto auto auto; gap:6px 10px; align-items:center; max-width:430px}
.grid-ct .lbl{color:var(--mut); font-size:12.5px}
.grid-ct .arrow{color:var(--faint)}
.sect{font-size:11px; text-transform:uppercase; letter-spacing:.16em; color:var(--faint); margin:12px 0 6px; grid-column:1/-1}
.sect:first-child{margin-top:0}
/* ── forte node tree: 5 columns, top node depends on bottom node ── */
.ftree{display:flex; gap:16px; margin:6px 0 2px; align-items:flex-end}
.fcol{display:flex; flex-direction:column; align-items:center}
.link{width:2px; height:12px; background:var(--line2); margin:3px 0}
.link.plan{background:var(--acc,var(--cyan)); box-shadow:0 0 5px color-mix(in srgb, var(--acc,var(--cyan)) 42%, transparent)}
.link.own{background:var(--acc,var(--gold)); box-shadow:0 0 5px color-mix(in srgb, var(--acc,var(--gold)) 45%, transparent)}
.node{width:26px; height:26px; padding:0; border-radius:50%; border:1.5px solid var(--line2);
  background:transparent; cursor:pointer; color:var(--mut);
  font-family:'Chakra Petch'; font-weight:700; font-size:13px;
  display:grid; place-items:center; transition:border-color .12s, background .12s, box-shadow .12s}
.node.major{width:30px; height:30px; border-radius:8px; transform:rotate(45deg)}
.node.inh{width:38px; height:38px; border-radius:10px}
.node.none:hover{border-color:var(--mut)}
.node.plan{border-color:var(--acc,var(--cyan)); color:var(--acc,var(--cyan));
  box-shadow:0 0 8px color-mix(in srgb, var(--acc,var(--cyan)) 38%, transparent)}
.node.own{background:var(--acc,var(--gold)); border-color:var(--acc,var(--gold)); color:#0A0E16;
  box-shadow:0 0 8px color-mix(in srgb, var(--acc,var(--gold)) 45%, transparent)}
.ftree-legend{font-size:11.5px; color:var(--faint); margin:8px 0 2px}
.lg{display:inline-block; width:10px; height:10px; border-radius:50%; border:1.5px solid var(--line2); vertical-align:-1px}
.lg.plan{border-color:var(--acc,var(--cyan)); box-shadow:0 0 5px color-mix(in srgb, var(--acc,var(--cyan)) 40%, transparent)}
.lg.own{background:var(--acc,var(--gold)); border-color:var(--acc,var(--gold))}
.empty{color:var(--faint); padding:22px 6px; text-align:center; font-size:13px}

/* ── mini forte tree: read-only status glyph on cards ── */
.mini{display:flex; gap:13px; padding:9px 12px 6px; align-items:flex-end; justify-content:center}
.mini .fcol{gap:0}
.mini .node{width:12px; height:12px; cursor:default; font-size:0}
.mini .node.major{width:13px; height:13px; border-radius:4px}
.mini .node.inh{width:18px; height:18px; border-radius:5px; font-size:9px}
.mini .link{height:7px; margin:2px 0}
.mini .sk{font-size:10.5px; color:var(--mut); margin-top:5px; font-variant-numeric:tabular-nums; white-space:nowrap}
.mini .sk b{color:var(--ink); font-weight:600}

/* ── edit pop-up ────────────────────────── */
#modalWrap{position:fixed; inset:0; z-index:40; background:rgba(6,9,16,.66);
  display:grid; place-items:center; padding:16px}
#modalWrap[hidden]{display:none}
.modal{background:var(--panel); border:1px solid var(--line2); border-radius:12px;
  width:min(600px,94vw); max-height:88vh; overflow:auto; padding:16px 18px;
  box-shadow:0 18px 50px rgba(0,0,0,.55)}
.modal-h{display:flex; align-items:center; gap:10px; margin-bottom:14px}
.modal-h .gname{font-size:16px}
.modal-h .close{margin-left:auto}
.medit{display:flex; gap:14px; margin-top:16px; align-items:flex-end; flex-wrap:wrap}
.medit .fcol{gap:2px}
.medit select{width:60px; padding:3px 4px; font-size:12.5px; text-align:center}
.medit .sklbl{font-size:10px; letter-spacing:.08em; text-transform:uppercase;
  color:var(--faint); margin:7px 0 3px; text-align:center}
.medit .arrow-v{color:var(--faint); font-size:10px; line-height:1.4}
.medit .gut button{width:34px; height:27px; padding:0; font-size:11px}
.medit .gut .arrow-v{visibility:hidden}
.medit .gut .skspace{height:24px}
.medit .skpm{display:flex; gap:3px; margin-top:4px}
.medit .skpm button{width:28px; height:20px; padding:0; font-size:12px; border-radius:5px;
  font-family:'Chakra Petch',sans-serif; color:var(--mut); background:var(--panel);
  border:1px solid var(--line2); cursor:pointer}
.medit .skpm button:hover{border-color:var(--acc,var(--cyan)); color:var(--ink)}

/* ── add-goal palette (Ctrl+K) ─────────── */
button.search{display:inline-flex; align-items:center; gap:8px; min-width:230px;
  background:var(--panel2); color:var(--mut); font-weight:500; text-align:left}
button.search kbd{margin-left:auto; font-family:inherit; font-size:10px; color:var(--faint);
  border:1px solid var(--line2); border-radius:4px; padding:1px 5px}
#palWrap{position:fixed; inset:0; z-index:50; background:rgba(6,9,16,.55);
  display:flex; justify-content:center; align-items:flex-start; padding:12vh 16px 16px}
.palette{background:var(--panel); border:1px solid var(--line2); border-radius:12px;
  width:min(480px,94vw); box-shadow:0 18px 50px rgba(0,0,0,.55); overflow:hidden}
.palette input{width:100%; border:none; border-bottom:1px solid var(--line); border-radius:0;
  background:var(--panel2); padding:12px 14px; font:inherit; font-size:14px; color:var(--ink); outline:none}
#palList{max-height:320px; overflow:auto; overscroll-behavior:contain}
.pal-item{display:flex; gap:10px; align-items:center; padding:7px 12px; cursor:pointer; font-size:13px}
.pal-item.r5{background:rgba(229,181,102,.08)}
.pal-item.r4{background:rgba(166,127,224,.09)}
.pal-item.r3{background:rgba(92,168,222,.09)}
.pal-item.on{background:var(--line)}
.pal-item .ico-wrap{width:26px; height:26px; margin:0; flex:none}
.pal-item .ico-wrap img{width:26px; height:26px}
.pal-item .tag{margin-left:auto; font-size:10px; color:var(--faint); letter-spacing:.08em;
  text-transform:uppercase; white-space:nowrap}
.pal-item .tag.q{color:var(--cyan)}

/* ── material tiles: icon on rarity-tinted ground, qty below, name on hover ── */
.tiles{display:flex; flex-wrap:wrap; gap:6px; padding:2px 0}
.tile{width:46px; border:1px solid var(--line2); border-radius:8px; background:var(--panel);
  display:flex; flex-direction:column; align-items:center; overflow:hidden; cursor:default}
.tile .ico-wrap{width:32px; height:32px; margin:5px 0 3px}
.tile .ico-wrap img{width:30px; height:30px; border-radius:4px}
.tile .qty{display:block; width:100%; text-align:center; font-size:10.5px; font-weight:600;
  padding:1px 2px 2px; background:rgba(6,9,16,.5); color:var(--ink); white-space:nowrap}
.tile.r1{background:rgba(155,166,188,.10); border-color:rgba(155,166,188,.35)}
.tile.r2{background:rgba(105,184,118,.16); border-color:rgba(105,184,118,.45)}
.tile.r3{background:rgba(92,168,222,.16);  border-color:rgba(92,168,222,.45)}
.tile.r4{background:rgba(166,127,224,.18); border-color:rgba(166,127,224,.5)}
.tile.r5{background:rgba(229,181,102,.18); border-color:rgba(229,181,102,.5)}
.tile.r0{background:rgba(95,217,228,.08);  border-color:rgba(95,217,228,.3)}
.tile.done{opacity:.5}
.tile.done .qty{color:var(--green)}
.mats-note{color:var(--faint); font-size:12px; padding:6px 0}

/* ── material rows ──────────────────────── */
table.mats{width:100%; border-collapse:collapse; margin-top:6px}
table.mats td{padding:4px 4px; border-bottom:1px solid rgba(35,44,66,.55); font-size:13px; vertical-align:middle}
table.mats tr:last-child td{border-bottom:none}
td.qty{text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap}
td.qty.ok{color:var(--green)} td.qty.short{color:var(--red)}
.dot{display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:8px; vertical-align:0;
  box-shadow:0 0 6px currentColor}
.cat{font-size:10.5px; text-transform:uppercase; letter-spacing:.16em; color:var(--faint); padding-top:12px !important}
td.inv{width:96px; text-align:right}
.tabs{display:flex; gap:4px; padding:10px 16px 0}
.tabs button{border-radius:7px 7px 0 0; border-bottom:none; background:transparent; border-color:transparent; color:var(--mut)}
.tabs button.on{background:var(--panel2); border-color:var(--line); color:var(--ink)}
.tot-credits{font-family:'Chakra Petch'; font-size:13px; color:var(--gold)}
.footer{margin-top:26px; color:var(--faint); font-size:11.5px; line-height:1.7}
.footer b{color:var(--mut)}
.pill{display:inline-block; border:1px solid var(--line2); border-radius:20px; padding:2px 10px; font-size:11px; color:var(--mut); margin-right:6px}
.goalstat{display:flex; align-items:center; gap:8px; padding:7px 10px; border:1px solid var(--line); border-radius:8px; margin-bottom:8px; font-size:13px}
.goalstat .st{margin-left:auto; font-family:'Chakra Petch'; font-size:11.5px; font-weight:600; letter-spacing:.06em}

/* Completed tab: node indicator — lit diamond = owned nodes cover the
   per-rarity template plan (live: template edits re-grade it) */
.nodechk{width:9px; height:9px; flex:none; border-radius:2px; transform:rotate(45deg);
  border:1px solid var(--line2); background:var(--panel2); cursor:help}
.nodechk.on{background:var(--acc,var(--cyan)); border-color:var(--acc,var(--cyan));
  box-shadow:0 0 7px var(--acc,var(--cyan))}
.st.ready{color:var(--green)} .st.miss{color:var(--red)}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="eyebrow">Wuthering Waves · Resource Planner</div>
  <h1>Resonance Ledger <span class="thin">/ build queue</span></h1>
  <svg class="wave" viewBox="0 0 260 14" aria-hidden="true">
    <path d="M0 7 L30 7 34 2 38 12 42 4 46 10 50 7 90 7 94 3 98 11 102 7 150 7 154 1 158 13 162 5 166 9 170 7 260 7"/>
  </svg>
  <div class="toolbar">
    <button class="search" id="btnAdd" title="Fuzzy-search characters and weapons (Ctrl+K)">⌕ Add goal…<kbd>Ctrl K</kbd></button>
    <button class="ghost" id="btnTpl" title="Edit the default goal templates for new 4★/5★ characters">Templates</button>
    <span class="spacer"></span>
    <button class="ghost" id="btnExport">Export JSON</button>
    <button class="ghost" id="btnImport">Import JSON</button>
    <button class="ghost danger" id="btnReset">Reset all</button>
    <input type="file" id="fileImport" accept="application/json" hidden>
  </div>
  <div class="storage-note" id="storageNote"></div>
</header>

<div class="cols">
  <aside class="sticky">
    <section class="panel">
      <div class="tabs" id="tabs"></div>
      <div class="panel-b" id="summary"></div>
    </section>
    <div class="footer" id="footer"></div>
  </aside>

  <section class="panel">
    <div class="panel-h"><h2>Priority queue</h2><span class="sub">first = farm first · 2 per row</span></div>
    <div class="panel-b" id="goals"></div>
  </section>
</div>

<div id="modalWrap" hidden>
  <div class="modal" id="modalBox" role="dialog" aria-modal="true" aria-label="Edit goal"></div>
</div>

<div id="palWrap" hidden>
  <div class="palette" role="dialog" aria-modal="true" aria-label="Add goal">
    <input id="palIn" type="text" placeholder="Add a character or weapon…" autocomplete="off" spellcheck="false">
    <div id="palList"></div>
  </div>
</div>
</div>
<script>
/* ═══════════════════════════════════════════════════════════════════
   GAME DATA — edit this block to add characters after a new patch.
   Cost templates are identical for every character of a given rarity;
   a character entry only names WHICH materials it uses.
   Verified against game config (v3.4) + wiki totals, Jul 2026.
   ═══════════════════════════════════════════════════════════════════ */
const GAME = {
  // cumulative Resonator EXP required to reach each milestone level from Lv.1
  charExpCum: {1:0, 20:33300, 40:208800, 50:397100, 60:683700, 70:1096700, 80:1669100, 90:2438000},
  creditPerExp: 0.35,                       // Shell Credits consumed per EXP point applied
  expItems: [                                // Resonance Potions, low → high tier
    {id:'exp1', name:'Basic Resonance Potion',    exp:1000,  r:2},
    {id:'exp2', name:'Medium Resonance Potion',   exp:3000,  r:3},
    {id:'exp3', name:'Advanced Resonance Potion', exp:8000,  r:4},
    {id:'exp4', name:'Premium Resonance Potion',  exp:20000, r:5},
  ],

  // 5★ character ascension: cost paid at each rank (unlocks next 10/20 levels)
  // c=credits, boss, spec(ialty), cm = [tierIndex0-3, qty]
  asc5: [
    {c:5000,  boss:0,  spec:0,  cm:[0,4]},   // rank 1 @ Lv20
    {c:10000, boss:3,  spec:4,  cm:[1,4]},   // rank 2 @ Lv40
    {c:15000, boss:6,  spec:8,  cm:[1,8]},   // rank 3 @ Lv50
    {c:20000, boss:9,  spec:12, cm:[2,4]},   // rank 4 @ Lv60
    {c:40000, boss:12, spec:16, cm:[2,8]},   // rank 5 @ Lv70
    {c:80000, boss:16, spec:20, cm:[3,4]},   // rank 6 @ Lv80
  ],

  // Forte main-node upgrade cost per target level (2..10)
  // f=[forgeTier,qty], cm=[commonTier,qty], w=weekly qty, c=credits
  skillUp: {
    2:{f:[0,2], cm:[0,2], w:0, c:1500},
    3:{f:[0,3], cm:[0,3], w:0, c:2000},
    4:{f:[1,2], cm:[1,2], w:0, c:4500},
    5:{f:[1,3], cm:[1,3], w:0, c:6000},
    6:{f:[2,3], cm:[2,2], w:0, c:16000},
    7:{f:[2,5], cm:[2,3], w:1, c:30000},
    8:{f:[3,2], cm:[3,2], w:1, c:50000},
    9:{f:[3,3], cm:[3,3], w:1, c:70000},
    10:{f:[3,6], cm:[3,4], w:1, c:100000},
  },
  minorNode:  {f:[2,3], cm:[2,3], w:0, c:50000},   // ×4 lower stat-bonus nodes
  majorNode:  {f:[3,3], cm:[3,3], w:1, c:100000},  // ×4 upper stat-bonus nodes
  inherent1:  {f:[1,3], cm:[1,3], w:1, c:10000},
  inherent2:  {f:[2,3], cm:[2,3], w:1, c:20000},

  skillNames: ['Basic Attack','Resonance Skill','Forte Circuit','Resonance Liberation','Intro Skill'],

  // material families (tiers low → high, rarity 2..5)
  families: {
    // enemy drops

const ORD_LEVEL = o => MILES[Math.floor((o+1)/2)];
const ORD_LABEL = o => o===0 ? 'Lv 1' : (o%2 ? 'Lv '+ORD_LEVEL(o) : 'Lv '+ORD_LEVEL(o)+' ✦');

<script>
/* ═══════════════════════════════════════════════════════════════════
   ENGINE — pure calculation layer. No DOM access anywhere in this
   block, so it can be unit-tested headlessly (Node) as-is.
   Bags are plain objects {materialId: qty}. Special ids:
   'credits' (Shell Credits) and 'exp' (raw Resonator EXP).
   ═══════════════════════════════════════════════════════════════════ */

// ── material registry: id → {name, cat, r(arity), family?, tier?} ──
function buildMatRegistry(){
  const M = {};
  M.credits = {name:'Shell Credit', cat:'Credits', r:3};
  M.exp     = {name:'Resonator EXP', cat:'EXP', r:0};
  M.wexp    = {name:'Weapon EXP', cat:'EXP', r:0};
  GAME.expItems.forEach(it => M[it.id] = {name:it.name, cat:'EXP', r:it.r});
  GAME.wpnExpItems.forEach(it => M[it.id] = {name:it.name, cat:'EXP', r:it.r});
  const famCat = {};
  for(const c of Object.values(GAME.characters)){
    famCat[c.common] = 'Enemy Drops';
    famCat[c.forge]  = 'Forgery';
    M['boss:'+c.boss]     = {name:c.boss,   cat:'Boss Drops', r:4};
    M['spec:'+c.spec]     = {name:c.spec,   cat:'Specialty',  r:1};
    M['wk:'+c.weekly]     = {name:c.weekly, cat:'Weekly Boss', r:4};
  }
  for(const w of Object.values(GAME.weapons)){
    famCat[w.common] = famCat[w.common] || 'Enemy Drops';
    famCat[w.forge]  = 'Forgery';
  }
  for(const [fid, names] of Object.entries(GAME.families))
    names.forEach((n,i) => M[fid+i] = {name:n, cat:famCat[fid]||'Enemy Drops', r:2+i, family:fid, tier:i});
  return M;
}
const MATS = buildMatRegistry();
const CATEGORY_ORDER = ['Credits','EXP','Boss Drops','Weekly Boss','Specialty','Enemy Drops','Forgery'];

// ── bag helpers ──
const bagAdd = (bag, id, qty) => { if(qty>0) bag[id] = (bag[id]||0) + qty; return bag; };
const bagMerge = (a, b) => { for(const [k,v] of Object.entries(b)) bagAdd(a,k,v); return a; };

// ── default goal states ──
const freshState = () => ({ord:0, skills:[1,1,1,1,1], inh1:0, inh2:0, minor:0, major:0});
const maxedState = () => ({ord:13, skills:[10,10,10,10,10], inh1:1, inh2:1, minor:4, major:4});
const freshWpnState = () => ({ord:0});
const maxedWpnState = () => ({ord:13});
/* built-in default TARGETS for new character goals, per rarity (user-tuned):
   5★ — Lv90, forte 6, both inherents, all 8 stat nodes
   4★ — Lv80 (unascended), forte 6, both inherents, all 8 stat nodes
   The user can overwrite these from the toolbar "Templates" pop-up;
   overrides live in the save file, these are the out-of-the-box values. */
const defaultGoalTgt = r => r === 4
  ? {ord:11, skills:[6,6,6,6,6], inh1:1, inh2:1, minor:4, major:4}
  : {ord:13, skills:[6,6,6,6,6], inh1:1, inh2:1, minor:4, major:4};

/* Completed-tab node indicator: how far a built goal's OWNED node counts
   fall short of a template's planned counts (templates are count-based —
   they say how many nodes, not which columns). All-zero shortfall ⇔ the
   build covers the template plan. Live comparison: editing a template
   re-grades every completed build. */
const nodeShortfall = (cur, tpl) => ({
  minor: Math.max(0, (tpl.minor || 0) - (cur.minor || 0)),
  major: Math.max(0, (tpl.major || 0) - (cur.major || 0)),
  inh1:  Math.max(0, (tpl.inh1  || 0) - (cur.inh1  || 0)),
  inh2:  Math.max(0, (tpl.inh2  || 0) - (cur.inh2  || 0)),
});

/* ── core: materials to move one goal from `cur` to `tgt` ──
   Character goal = {char, cur, tgt}; state = {ord, skills[5], inh1/2, minor, major}.
   Weapon goal    = {weapon, cur, tgt}; state = {ord} — no forte tree.
   The `weapon` key is the discriminator (old saves only ever have `char`). */
function costForGoal(goal){
  return goal.weapon !== undefined ? costForWeaponGoal(goal) : costForCharGoal(goal);
}

function costForWeaponGoal(goal){
  const w = GAME.weapons[goal.weapon];
  const bag = {};
  const {cur, tgt} = goal;
  const curve = w.rarity === 4 ? GAME.wpnExpCum4 : GAME.wpnExpCum5;
  const asc   = w.rarity === 4 ? GAME.asc4w     : GAME.asc5w;

  // 1. leveling EXP (+ credits to apply it)
  const exp = curve[ORD_LEVEL(tgt.ord)] - curve[ORD_LEVEL(cur.ord)];
  if(exp > 0){
    bagAdd(bag, 'wexp', exp);
    bagAdd(bag, 'credits', Math.round(exp * GAME.wpnCreditPerExp));
  }

  // 2. ascension ranks crossed: rank r sits at ordinal 2r (same encoding as characters)
  for(let r=1; r<=6; r++)
    if(cur.ord < 2*r && tgt.ord >= 2*r){
      const row = asc[r-1];
      bagAdd(bag, 'credits', row.c || 0);
      if(row.cm) bagAdd(bag, w.common + row.cm[0], row.cm[1]);
      if(row.f)  bagAdd(bag, w.forge  + row.f[0],  row.f[1]);
    }
  return bag;
}

function costForCharGoal(goal){
  const ch = GAME.characters[goal.char];
  const bag = {};
  const {cur, tgt} = goal;
  // rank is set for ascension rows only; it activates the per-entry Rover
  // overrides (bossCounts: fixed boss qty per rank; ascCommon: ascension
  // enemy family when it differs from the forte one — Rover: Aero)
  const addRow = (row, rank) => {           // row: {c, f?, cm?, w?, boss?, spec?}
    bagAdd(bag, 'credits', row.c || 0);
    const bossN = rank && ch.bossCounts ? ch.bossCounts[rank-1] : row.boss;
    if(bossN)    bagAdd(bag, 'boss:'+ch.boss, bossN);
    if(row.spec) bagAdd(bag, 'spec:'+ch.spec, row.spec);
    if(row.w)    bagAdd(bag, 'wk:'+ch.weekly, row.w);
    if(row.cm)   bagAdd(bag, (rank && ch.ascCommon || ch.common) + row.cm[0], row.cm[1]);
    if(row.f)    bagAdd(bag, ch.forge  + row.f[0],  row.f[1]);
  };

  // 1. leveling EXP (+ credits to apply it)
  const exp = GAME.charExpCum[ORD_LEVEL(tgt.ord)] - GAME.charExpCum[ORD_LEVEL(cur.ord)];
  if(exp > 0){
    bagAdd(bag, 'exp', exp);
    bagAdd(bag, 'credits', Math.round(exp * GAME.creditPerExp));
  }

  // 2. ascension ranks crossed: rank r sits at ordinal 2r
  for(let r=1; r<=6; r++)
    if(cur.ord < 2*r && tgt.ord >= 2*r) addRow(GAME.asc5[r-1], r);

  // 3. forte main nodes
  for(let s=0; s<5; s++)
    for(let L=(cur.skills[s]||1)+1; L<=(tgt.skills[s]||1); L++)
      addRow(GAME.skillUp[L]);

  // 4. inherent skills (Ⅱ requires Ⅰ in-game — the node grid enforces it) + stat-bonus nodes
  if(!cur.inh1 && tgt.inh1) addRow(GAME.inherent1);
  if(!cur.inh2 && tgt.inh2) addRow(GAME.inherent2);
  for(let i=0; i<Math.max(0, (tgt.minor||0)-(cur.minor||0)); i++) addRow(GAME.minorNode);
  for(let i=0; i<Math.max(0, (tgt.major||0)-(cur.major||0)); i++) addRow(GAME.majorNode);

  return bag;
}

const totalBag = goals => goals.reduce((acc,g) => bagMerge(acc, costForGoal(g)), {});

/* ── EXP → item plan: greedy from the top tier, minimal overflow ── */
function expToItems(exp, source){
  const plan = {}; let rem = Math.max(0, exp);
  const items = [...source].sort((a,b) => b.exp - a.exp);
  items.forEach((it, i) => {
    const last = i === items.length - 1;
    const n = last ? Math.ceil(rem / it.exp) : Math.floor(rem / it.exp);
    if(n > 0){ plan[it.id] = n; rem -= n * it.exp; }
  });
  return plan;                              // rem ≤ 0 by construction
}
const expToPotions = exp => expToItems(exp, GAME.expItems);
const wexpToCores  = exp => expToItems(exp, GAME.wpnExpItems);

/* ── inventory-aware deficit ──
   inv: {matId: qty} incl. potion ids and 'credits'.
   synth: apply 3→1 upward crafting of surplus within each family.
   Returns {rem, invExp, needExp, potionPlan} */
function remainingBag(need, inv, synth){
  const rem = {};
  const have = id => Math.max(0, Math.floor(inv[id] || 0));

  // family materials, with optional synthesis of surplus
  const famNeeded = new Set(Object.keys(need).map(id => MATS[id]?.family).filter(Boolean));
  const famRem = {};
  for(const fid of famNeeded){
    const ids = [0,1,2,3].map(t => fid + t);
    const h = ids.map(have);
    const n = ids.map(id => need[id] || 0);
    if(synth)
      for(let t=0; t<3; t++){
        const surplus = h[t] - n[t];
        if(surplus > 0) h[t+1] += Math.floor(surplus / 3);
      }
    ids.forEach((id, t) => famRem[id] = Math.max(0, n[t] - h[t]));
  }

  for(const [id, qty] of Object.entries(need)){
    if(id === 'exp' || id === 'wexp') continue;
    const r = id in famRem ? famRem[id] : Math.max(0, qty - have(id));
    if(r > 0) rem[id] = r;
  }

  // EXP: potions/cores in inventory count as pooled EXP reserves
  const invExp = GAME.expItems.reduce((s, it) => s + have(it.id) * it.exp, 0);
  const needExp = need.exp || 0;
  const remExp = Math.max(0, needExp - invExp);
  if(remExp > 0) rem.exp = remExp;

  const invWexp = GAME.wpnExpItems.reduce((s, it) => s + have(it.id) * it.exp, 0);
  const needWexp = need.wexp || 0;
  const remWexp = Math.max(0, needWexp - invWexp);
  if(remWexp > 0) rem.wexp = remWexp;

  return {rem, invExp, needExp, potionPlan: expToPotions(remExp),
          invWexp, needWexp, corePlan: wexpToCores(remWexp)};
}

/* ── priority walk: allocate inventory to goals in queue order ──
   Crafting is intentionally NOT applied here (a craft spent on goal 1
   would silently eat goal 2's tier-3 stock); plain subtraction only.
   Returns [{goal, need, rem, ready}] */
function farmNextWalk(goals, inv){
  const pool = {};
  for(const [k,v] of Object.entries(inv)) pool[k] = Math.max(0, Math.floor(v||0));
  let expPool  = GAME.expItems.reduce((s,it) => s + (pool[it.id]||0) * it.exp, 0);
  let wexpPool = GAME.wpnExpItems.reduce((s,it) => s + (pool[it.id]||0) * it.exp, 0);

  return goals.map(goal => {
    const need = costForGoal(goal);
    const rem = {};
    for(const [id, qty] of Object.entries(need)){
      if(id === 'exp'){
        const use = Math.min(qty, expPool); expPool -= use;
        if(qty - use > 0) rem.exp = qty - use;
      } else if(id === 'wexp'){
        const use = Math.min(qty, wexpPool); wexpPool -= use;
        if(qty - use > 0) rem.wexp = qty - use;
      } else {
        const use = Math.min(qty, pool[id] || 0);
        pool[id] = (pool[id] || 0) - use;
        if(qty - use > 0) rem[id] = qty - use;
      }
    }
    return {goal, need, rem, ready: Object.keys(rem).length === 0};
  });
}

/* ── aggregate ordering: materials appear in the order the priority queue
   first needs them — P1's mats (category-sorted) first, then whatever P2
   adds that P1 didn't need, and so on ── */
function priorityMatIds(goals){
  const seen = new Set(), out = [];
  for(const g of goals)
    for(const id of sortMatIds(Object.keys(costForGoal(g))))
      if(!seen.has(id)){ seen.add(id); out.push(id); }
  return out;
}

/* ── subsequence fuzzy match (add-goal palette) ──
   Every query char must appear in the name, in order ('aoh' hits "Ages of
   Harvest"). Returns a penalty — lower is better — or -1 for no match.
   Penalties: +2 per gap between matched letters, +3 per char of offset
   before the first hit, +0.1 per unmatched trailing char (shorter names
   win ties). Empty query matches everything at 0. */
function fuzzyScore(q, name){
  q = q.toLowerCase(); const n = name.toLowerCase();
  if(!q) return 0;
  let qi = 0, pen = 0, last = -1, first = -1;
  for(let i = 0; i < n.length && qi < q.length; i++){
    if(n[i] !== q[qi]) continue;
    if(first < 0) first = i;
    if(last >= 0 && i > last + 1) pen += 2;
    last = i; qi++;
  }
  if(qi < q.length) return -1;
  return pen + first * 3 + (n.length - q.length) * 0.1;
}

/* ── display helpers (pure) ── */
const fmt = n => n.toLocaleString('en-US');
/* compact form for material tiles: 2,438,000 → "2.44M", 505,200 → "505K";
   below 10,000 the full number still fits, so keep it exact */
function fmtShort(n){
  const sig3 = v => String(v >= 100 ? Math.round(v) : v >= 10 ? Math.round(v*10)/10 : Math.round(v*100)/100);
  if(n >= 1e6) return sig3(n/1e6) + 'M';
  if(n >= 1e4) return sig3(n/1e3) + 'K';
  return fmt(n);
}
function sortMatIds(ids){
  return ids.sort((a,b) => {
    const A = MATS[a], B = MATS[b];
    const c = CATEGORY_ORDER.indexOf(A.cat) - CATEGORY_ORDER.indexOf(B.cat);
    if(c) return c;
    if(A.family && B.family && A.family !== B.family) return A.family < B.family ? -1 : 1;
    if(A.r !== B.r) return A.r - B.r;
    return A.name < B.name ? -1 : 1;
  });
}
</script>

<script>
/* ═══════════════════════════════════════════════════════════════════
   UI LAYER — state, persistence, rendering. Everything below touches
   the DOM; everything above stays pure.
   ═══════════════════════════════════════════════════════════════════ */
const $ = sel => document.querySelector(sel);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

/* ── icons: resolve by naming convention, fall back gracefully ── */
const iconSlug = name => name.toLowerCase().replace(/'/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'') + '_icon';
const iconBase = (name, kind) => GAME.icons.dir + GAME.icons.kinds[kind] + (GAME.icons.overrides[name] || iconSlug(name));
const icoImg = (name, kind, cls='') =>
  `<img class="__ico ${cls}" alt="" draggable="false" src="${iconBase(name,kind)}.${GAME.icons.exts[0]}" data-b="${iconBase(name,kind)}" data-i="0">`;
const matIco = id =>
  `<span class="ico-wrap">${icoImg(MATS[id].name, 'mat')}<span class="dot" style="color:${dotColor(id)}" hidden></span></span>`;
function icoFail(img){
  const i = +img.dataset.i + 1, exts = GAME.icons.exts;
  if(i < exts.length){ img.dataset.i = i; img.src = img.dataset.b + '.' + exts[i]; }
  else{
    img.hidden = true;                                   // reveal what's underneath/next to it
    const fb = img.nextElementSibling;
    if(fb && fb.classList.contains('dot')) fb.hidden = false;
  }
}
const bindIcons = root =>
  root.querySelectorAll('img.__ico').forEach(img => img.addEventListener('error', () => icoFail(img)));

/* ── persistence ── */
const STORE_KEY = 'wuwa-planner-v1';
let storageOK = false;
try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); storageOK = true; } catch(e){}

/* ── forte node grid model ──
   goal.nodes = 2×5 matrix, nodes[row][col], row 0 = lower, row 1 = upper.
   Columns 0,1,3,4 are stat columns (lower = minor, upper = major);
   column 2 is Inherent Ⅰ (lower) / Inherent Ⅱ (upper).
   Cell values: 0 = skip · 1 = planned · 2 = owned.
   In-game rule: an upper node requires its lower node, so every column
   must satisfy nodes[0][c] ≥ nodes[1][c]. enforceTree() repairs any
   violation by raising the lower cell. Count fields on cur/tgt are
   derived from the matrix for the engine. */
const STAT_COLS = [0,1,3,4], INH_COL = 2;
const enforceTree = m => { for(let c=0; c<5; c++) m[0][c] = Math.max(m[0][c], m[1][c]); return m; };

const nodesFrom = (raw, cur, tgt) => {
  const val = v => clamp(Math.floor(+v) || 0, 0, 2);
  const n = raw && raw.nodes;
  let m;
  if(Array.isArray(n) && Array.isArray(n[0]) && Array.isArray(n[1])){
    m = [0,1].map(r => [0,1,2,3,4].map(c => val(n[r][c])));            // current matrix format
  } else if(n && Array.isArray(n.minor) && Array.isArray(n.major) && Array.isArray(n.inh)){
    const g2 = k => [0,1,2,3].map(j => val(n[k][j]));                  // v2 {minor,major,inh} format
    const mi = g2('minor'), ma = g2('major'), inh = [0,1].map(j => val(n.inh[j]));
    m = [[mi[0], mi[1], inh[0], mi[2], mi[3]],
         [ma[0], ma[1], inh[1], ma[2], ma[3]]];
  } else {                                                             // v1 count-based format
    const seq = (own, want, len) => [...Array(len).keys()].map(k => k < own ? 2 : k < want ? 1 : 0);
    const mi = seq(cur.minor, tgt.minor, 4), ma = seq(cur.major, tgt.major, 4);
    m = [[mi[0], mi[1], cur.inh1 ? 2 : tgt.inh1 ? 1 : 0, mi[2], mi[3]],
         [ma[0], ma[1], cur.inh2 ? 2 : tgt.inh2 ? 1 : 0, ma[2], ma[3]]];
  }
  return enforceTree(m);
};
function syncNodeCounts(goal){
  const m = goal.nodes;
  const own = cells => cells.filter(v => v === 2).length, want = cells => cells.filter(v => v >= 1).length;
  const lo = STAT_COLS.map(c => m[0][c]), hi = STAT_COLS.map(c => m[1][c]);
  goal.cur.minor = own(lo);  goal.tgt.minor = want(lo);
  goal.cur.major = own(hi);  goal.tgt.major = want(hi);
  goal.cur.inh1 = m[0][INH_COL] === 2 ? 1 : 0;  goal.tgt.inh1 = m[0][INH_COL] >= 1 ? 1 : 0;
  goal.cur.inh2 = m[1][INH_COL] === 2 ? 1 : 0;  goal.tgt.inh2 = m[1][INH_COL] >= 1 ? 1 : 0;
}
/* dflts is the per-rarity default-target map (state.defaults); passed as a
   parameter because defaultState() runs before `state` exists */
function newGoal(char, open, dflts){
  const ch = GAME.characters[char];
  const src = (dflts && dflts[ch.rarity]) || defaultGoalTgt(ch.rarity);
  const g = {char, cur:freshState(), tgt:{...src, skills:[...src.skills]}, open:!!open};
  g.nodes = nodesFrom(null, g.cur, g.tgt);
  syncNodeCounts(g);
  return g;
}
const newWpnGoal = (weapon, open) => ({weapon, cur:freshWpnState(), tgt:maxedWpnState(), open:!!open});

const defaultState = () => ({
  goals: [newGoal('jinhsi', true), newGoal('phoebe', false), newGoal('suisui', false)],
  done: [], inv:{}, synth:true, hideUn:false, tab:'total',
  defaults: {4: defaultGoalTgt(4), 5: defaultGoalTgt(5)},
});

function sanitize(raw){
  const st = {goals:[], done:[], inv:{}, synth: raw ? !!raw.synth : true,
              hideUn: !!(raw && raw.hideUn),
              tab: ['total','left','next','done'].includes(raw && raw.tab) ? raw.tab : 'total'};
  const fix = x => {
    const o = freshState();
    if(x && typeof x === 'object'){
      o.ord = clamp(Math.floor(+x.ord)||0, 0, 13);
      o.skills = [0,1,2,3,4].map(k => clamp(Math.floor(+((x.skills||[])[k]))||1, 1, 10));
      const legacy = clamp(Math.floor(+x.inh)||0, 0, 2);       // pre-grid saves used a count
      o.inh1 = x.inh1 !== undefined ? (x.inh1 ? 1 : 0) : (legacy >= 1 ? 1 : 0);
      o.inh2 = x.inh2 !== undefined ? (x.inh2 ? 1 : 0) : (legacy >= 2 ? 1 : 0);
      o.minor = clamp(Math.floor(+x.minor)||0, 0, 4);
      o.major = clamp(Math.floor(+x.major)||0, 0, 4);
    }
    return o;
  };
  // a character may exist once across queue + completed; queue wins the tie
  const charTaken = id => st.goals.some(x => x.char === id) || st.done.some(x => x.char === id);
  const intake = (rawList, into) => {
    if(!Array.isArray(rawList)) return;
    for(const g of rawList){
      if(g && g.weapon !== undefined){                           // weapon goal: level+ascension only
        if(!GAME.weapons[g.weapon]) continue;                    // duplicates allowed (multiple copies)
        const ord = x => clamp(Math.floor(+(x && x.ord)) || 0, 0, 13);
        const cur = {ord: ord(g.cur)}, tgt = {ord: Math.max(ord(g.tgt), ord(g.cur))};
        into.push({weapon:g.weapon, cur, tgt, open:!!g.open});
        continue;
      }
      if(!g || !GAME.characters[g.char] || charTaken(g.char)) continue;
      const cur = fix(g.cur), tgt = fix(g.tgt);
      tgt.ord = Math.max(tgt.ord, cur.ord);
      tgt.skills = tgt.skills.map((v,k) => Math.max(v, cur.skills[k]));
      const goal = {char:g.char, cur, tgt, open:!!g.open};
      goal.nodes = nodesFrom(g, cur, tgt);
      syncNodeCounts(goal);                                    // grid always wins
      into.push(goal);
    }
  };
  intake(raw && raw.goals, st.goals);
  intake(raw && raw.done, st.done);
  if(raw && raw.inv && typeof raw.inv === 'object')
    for(const [k,v] of Object.entries(raw.inv))
      if(MATS[k] && Math.floor(+v) > 0) st.inv[k] = Math.floor(+v);
  // per-rarity default targets (added later than v1 — absent in old saves)
  const defTgt = (d, r) => {
    if(!d || typeof d !== 'object') return defaultGoalTgt(r);
    const o = fix(d);
    if(o.inh2) o.inh1 = 1;                    // Ⅱ requires Ⅰ
    o.minor = Math.max(o.minor, o.major);     // upper nodes require lower
    return o;
  };
  const rawDef = (raw && raw.defaults) || {};
  st.defaults = {4: defTgt(rawDef[4], 4), 5: defTgt(rawDef[5], 5)};
  return st;
}

function load(){
  if(storageOK){
    try{
      const raw = localStorage.getItem(STORE_KEY);
      if(raw) return sanitize(JSON.parse(raw));
    }catch(e){}
  }
  return defaultState();
}
let state = load();

function note(msg, warn){
  const n = $('#storageNote');
  n.textContent = msg;
  n.className = 'storage-note' + (warn ? ' warn' : '');
}
function save(){
  if(!storageOK){ return; }
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
    const t = new Date();
    note('Saved in this browser · ' + t.toTimeString().slice(0,5));
  }catch(e){ note('Could not save — use Export to keep your plan.', true); }
}

/* ── shared row builders ── */
function dotColor(id){
  if(id === 'credits') return 'var(--gold)';
  if(id === 'exp') return 'var(--cyan)';
  if(id === 'wexp') return 'var(--vio)';
  return ({1:'#9BA6BC', 2:'var(--r2)', 3:'var(--r3)', 4:'var(--r4)', 5:'var(--r5)'})[MATS[id].r] || 'var(--mut)';
}
function planText(plan, source){
  const parts = [...source].reverse()
    .filter(it => plan[it.id])
    .map(it => esc(it.name.split(' ')[0]) + ' ×' + fmt(plan[it.id]));
  return parts.length ? '≈ ' + parts.join(' · ') : '';
}
const potionText = plan => planText(plan, GAME.expItems);
const coreText   = plan => planText(plan, GAME.wpnExpItems);
function catRow(cat, span){ return `<tr><td class="cat" colspan="${span}">${cat}</td></tr>`; }

/* icon-tile grid: rarity-tinted ground, abbreviated qty; the name (and the
   exact number, plus the potion/core plan for EXP) lives in the hover title */
function tileTip(id, qty){
  let tip = MATS[id].name + ' — ' + fmt(qty);
  if(id === 'exp'){ const p = potionText(expToPotions(qty)); if(p) tip += ' · ' + p; }
  if(id === 'wexp'){ const p = coreText(wexpToCores(qty)); if(p) tip += ' · ' + p; }
  return tip;
}
function matTiles(bag, order){
  const ids = order ? order.filter(id => id in bag) : sortMatIds(Object.keys(bag));
  if(!ids.length) return '';
  return `<div class="tiles">` + ids.map(id =>
    `<div class="tile r${MATS[id].r}" title="${esc(tileTip(id, bag[id]))}">` +
      matIco(id) +
      `<span class="qty num">${fmtShort(bag[id])}</span>` +
    `</div>`).join('') + `</div>`;
}

/* ── goal cards ── */
const ordOpts = ORDS.map(o => ({v:o, l:ORD_LABEL(o)}));
const skOpts  = [...Array(10).keys()].map(k => ({v:k+1, l:String(k+1)}));

const getF = (st,f) => f === 'ord' ? st.ord : f[0] === 's' ? st.skills[+f[1]] : st[f];
const setF = (st,f,v) => { if(f === 'ord') st.ord = v; else if(f[0] === 's') st.skills[+f[1]] = v; else st[f] = v; };

function sel(i, side, f, opts, val){
  return `<select data-g="${i}" data-side="${side}" data-f="${f}">` +
    opts.map(o => `<option value="${o.v}"${o.v === val ? ' selected' : ''}>${o.l}</option>`).join('') +
    '</select>';
}
function ctrlRow(label, i, f, opts, g){
  return `<span class="lbl">${label}</span>${sel(i,'cur',f,opts,getF(g.cur,f))}` +
         `<span class="arrow">→</span>${sel(i,'tgt',f,opts,getF(g.tgt,f))}`;
}

function nodeBtn(i, r, c, s, label){
  const st = ['none','plan','own'][s];
  const kind = c === INH_COL ? 'inh' : r === 1 ? 'major' : 'minor';
  const what = c === INH_COL ? 'Inherent Skill ' + (r+1)
             : (r === 1 ? 'Major' : 'Minor') + ' stat node (column ' + (c < INH_COL ? c+1 : c) + ')';
  const dep = r === 1 ? ' · requires the node below' : '';
  const how = {none:'skipped', plan:'planned', own:'owned'}[st];
  return `<button type="button" class="node ${kind} ${st}" data-g="${i}" data-r="${r}" data-c="${c}"` +
         ` title="${what} — ${how} (left-click: plan/skip · right- or double-click: owned)${dep}" aria-label="${what}: ${how}">${label || ''}</button>`;
}

/* read-only miniature of the forte tree, with each column's skill level
   (cur→tgt) beneath it — mirrors the in-game forte screen. Cards are pure
   status views; all editing happens in the pop-up. */
function miniTree(g){
  const st = v => v === 2 ? ' own' : v === 1 ? ' plan' : '';
  const cols = [0,1,2,3,4].map(c => {
    const inh = c === INH_COL;
    return `<div class="fcol">` +
      `<span class="node ${inh ? 'inh' : 'major'}${st(g.nodes[1][c])}">${inh ? 'Ⅱ' : ''}</span>` +
      `<span class="link${st(g.nodes[1][c])}"></span>` +
      `<span class="node ${inh ? 'inh' : 'minor'}${st(g.nodes[0][c])}">${inh ? 'Ⅰ' : ''}</span>` +
      `<span class="sk num" title="${esc(GAME.skillNames[c])}">${g.cur.skills[c]}→<b>${g.tgt.skills[c]}</b></span>` +
    `</div>`;
  }).join('');
  return `<div class="mini">${cols}</div>`;
}

/* card materials show the DEFICIT after inventory, allocated in queue order
   (farmNextWalk semantics: the first goal that needs a material eats the
   stock; later goals see what's left). Covered mats stay visible as ✓. */
const goalMats = wk => `<div class="goal-mats">${deficitTiles(wk.need, wk.rem) ||
  '<div class="mats-note">Nothing needed — current already meets target.</div>'}</div>`;

function deficitTip(id, needQty, left){
  let tip = MATS[id].name + ' — ' + (left
    ? fmt(left) + ' needed' + (left < needQty ? ' of ' + fmt(needQty) + ' total' : '')
    : 'covered by inventory · needs ' + fmt(needQty));
  if(id === 'exp' && left){ const p = potionText(expToPotions(left)); if(p) tip += ' · ' + p; }
  if(id === 'wexp' && left){ const p = coreText(wexpToCores(left)); if(p) tip += ' · ' + p; }
  return tip;
}
function deficitTiles(need, rem, order){
  const ids = order ? order.filter(id => id in need) : sortMatIds(Object.keys(need));
  if(!ids.length) return '';
  return `<div class="tiles">` + ids.map(id => {
    const left = rem[id] || 0;
    return `<div class="tile r${MATS[id].r}${left ? '' : ' done'}" title="${esc(deficitTip(id, need[id], left))}">` +
      matIco(id) +
      `<span class="qty num">${left ? fmtShort(left) : '✓'}</span>` +
    `</div>`;
  }).join('') + `</div>`;
}

/* fin = costForGoal is empty (current already meets target): offer ✓ to move
   the goal to state.done — shown on the Completed summary tab, restorable */
const goalCtrls = (i, fin) =>
  (fin ? `<button class="tiny good" data-act="done" data-g="${i}" title="Mark completed — moves to the Completed tab">✓</button>` : '') +
  `<button class="tiny" data-act="edit" data-g="${i}" title="Edit levels &amp; forte">✎</button>` +
  `<button class="tiny" data-act="up" data-g="${i}" ${i === 0 ? 'disabled' : ''} title="Move up">▲</button>` +
  `<button class="tiny" data-act="down" data-g="${i}" ${i === state.goals.length - 1 ? 'disabled' : ''} title="Move down">▼</button>` +
  `<button class="tiny danger" data-act="del" data-g="${i}" title="Remove">✕</button>`;

function goalCard(g, i, wk){
  return g.weapon !== undefined ? wpnCard(g, i, wk) : charCard(g, i, wk);
}

function wpnCard(g, i, wk){
  const w = GAME.weapons[g.weapon];
  return `<div class="goal" data-g="${i}" style="--acc:var(--weapon)">
    <div class="goal-top">
      <span class="grip" draggable="true" data-g="${i}" title="Drag to reorder">⠿</span>
      <span class="prio">P${i+1}</span>
      <span class="avatar" style="background:var(--r${w.rarity})">${w.mono}${icoImg(w.name, 'weapon', 'avatar-img')}</span>
      <div><div class="gname">${esc(w.name)}${w.beta ? '<span class="badge">3.5 BETA</span>' : ''}</div>
        <div class="gmeta">${w.rarity}★ ${w.wtype} weapon · ${ORD_LABEL(g.cur.ord)} → ${ORD_LABEL(g.tgt.ord)}</div></div>
      <div class="gctrl">${goalCtrls(i, !Object.keys(wk.need).length)}</div>
    </div>${goalMats(wk)}</div>`;
}

function charCard(g, i, wk){
  const ch = GAME.characters[g.char];
  return `<div class="goal" data-g="${i}" style="--acc:${ch.elColor}">
    <div class="goal-top">
      <span class="grip" draggable="true" data-g="${i}" title="Drag to reorder">⠿</span>
      <span class="prio">P${i+1}</span>
      <span class="avatar" style="background:${ch.elColor}">${ch.mono}${icoImg(ch.name, 'char', 'avatar-img')}</span>
      <div><div class="gname">${esc(ch.name)}${ch.beta ? '<span class="badge">3.5 BETA</span>' : ''}</div>
        <div class="gmeta">${ch.rarity}★ ${ch.element} · ${ch.wtype} · ${ORD_LABEL(g.cur.ord)} → ${ORD_LABEL(g.tgt.ord)}</div></div>
      <div class="gctrl">${goalCtrls(i, !Object.keys(wk.need).length)}</div>
    </div>${miniTree(g)}${goalMats(wk)}</div>`;
}

function renderGoals(){
  const box = $('#goals');
  const walk = farmNextWalk(state.goals, state.inv);   // priority-ordered inventory allocation
  box.innerHTML = state.goals.length
    ? state.goals.map((g, i) => goalCard(g, i, walk[i])).join('')
    : '<div class="empty">No goals yet — press Ctrl+K (or “⌕ Add goal…”) to queue a character or weapon.</div>';
  box.querySelectorAll('[data-act]').forEach(b => b.addEventListener('click', onAct));
  // cards are read-only status views — selects and node buttons live in the modal
  bindDnD(box);
  bindIcons(box);
}

/* left click: plan ↔ skip (an owned node demotes to planned first);
   right click or double click: toggle owned */
function onNode(e){
  const el = e.currentTarget;
  const g = state.goals[+el.dataset.g];
  const r = +el.dataset.r, c = +el.dataset.c, m = g.nodes;
  if(e.type === 'contextmenu' || e.type === 'dblclick'){
    e.preventDefault();
    m[r][c] = m[r][c] === 2 ? 1 : 2;
  } else {
    m[r][c] = m[r][c] === 2 ? 1 : m[r][c] ? 0 : 1;
  }
  if(r === 1) m[0][c] = Math.max(m[0][c], m[1][c]);   // raising the top pulls the bottom up
  else        m[1][c] = Math.min(m[1][c], m[0][c]);   // lowering the bottom pulls the top down
  syncNodeCounts(g);
  save(); render();
}

/* reorder: `to` is the insertion index in the pre-removal array */
function moveGoal(from, to){
  if(from === to || from + 1 === to){ dragIdx = null; render(); return; }
  const [g] = state.goals.splice(from, 1);
  state.goals.splice(to > from ? to - 1 : to, 0, g);
  dragIdx = null;
  save(); render();
}

let dragIdx = null;
function bindDnD(box){
  box.querySelectorAll('.goal').forEach(card => {
    const i = +card.dataset.g;
    const grip = card.querySelector('.grip');
    if(grip){
      grip.addEventListener('dragstart', e => {
        dragIdx = i;
        card.classList.add('dragging');
        if(e.dataTransfer){
          e.dataTransfer.effectAllowed = 'move';
          try{ e.dataTransfer.setData('text/plain', String(i)); }catch(_){}
          if(e.dataTransfer.setDragImage) e.dataTransfer.setDragImage(card, 24, 24);
        }
      });
      grip.addEventListener('dragend', () => { dragIdx = null; render(); });
    }
    card.addEventListener('dragover', e => {
      if(dragIdx === null) return;
      e.preventDefault();
      if(e.dataTransfer) e.dataTransfer.dropEffect = 'move';
      const r = card.getBoundingClientRect();
      const after = (e.clientY || 0) > r.top + r.height / 2;
      card.classList.toggle('drop-after', after);
      card.classList.toggle('drop-before', !after);
    });
    card.addEventListener('dragleave', () => card.classList.remove('drop-before','drop-after'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      if(dragIdx === null) return;
      const r = card.getBoundingClientRect();
      const after = (e.clientY || 0) > r.top + r.height / 2;
      moveGoal(dragIdx, i + (after ? 1 : 0));
    });
  });
}

function onAct(e){
  const i = +e.currentTarget.dataset.g, act = e.currentTarget.dataset.act;
  if(act === 'up')   return moveGoal(i, i - 1);
  if(act === 'down') return moveGoal(i, i + 2);
  if(act === 'edit'){ editIdx = i; render(); return; }
  if(act === 'del' || act === 'done'){
    const [g] = state.goals.splice(i, 1);
    if(act === 'done') state.done.push(g);
    if(editIdx !== null){                     // keep the pop-up pointed at the same goal
      if(editIdx === i) editIdx = null;
      else if(editIdx > i) editIdx--;
    }
  }
  save(); render();
}
function onField(e){
  const el = e.currentTarget;
  const g = state.goals[+el.dataset.g], f = el.dataset.f, v = +el.value;
  setF(g[el.dataset.side], f, v);
  if(el.dataset.side === 'cur') setF(g.tgt, f, Math.max(getF(g.tgt, f), v));
  else setF(g.cur, f, Math.min(getF(g.cur, f), v));
  save(); render();
}

/* ── add-goal palette: fuzzy search over characters + weapons (Ctrl+K) ──
   Already-queued AND completed characters are hidden (no duplicates; a
   completed char returns via ↩ on the Completed tab, keeping its state);
   weapons always add (dupes legal). Results group as 5★ chars · 4★ chars ·
   5★ weapons · 4★ · 3★, fuzzy score ranking within each group; rows carry
   a faint rarity tint. */
let palSel = 0;
const palIsOpen = () => !$('#palWrap').hidden;
function paletteEntries(q){
  const out = [];
  for(const [id, ch] of Object.entries(GAME.characters)){
    if(state.goals.some(g => g.char === id) || state.done.some(g => g.char === id)) continue;
    const s = fuzzyScore(q, ch.name);
    if(s >= 0) out.push({score:s, kind:'char', id, name:ch.name, rarity:ch.rarity});
  }
  for(const [id, wp] of Object.entries(GAME.weapons)){
    const s = fuzzyScore(q, wp.name);
    if(s >= 0) out.push({score:s, kind:'wpn', id, name:wp.name, rarity:wp.rarity});
  }
  const grp = it => (it.kind === 'char' ? 0 : 10) + (5 - it.rarity);
  return out.sort((a,b) => grp(a) - grp(b) || a.score - b.score || (a.name < b.name ? -1 : 1));
}
function openPal(){ closeEdit(); $('#palWrap').hidden = false; palSel = 0; renderPal(); $('#palIn').focus(); }
function closePal(){ $('#palWrap').hidden = true; $('#palIn').value = ''; }
function renderPal(){
  const list = paletteEntries($('#palIn').value.trim());
  palSel = clamp(palSel, 0, Math.max(0, list.length - 1));
  $('#palList').innerHTML = list.length ? list.map((it, i) =>
    `<div class="pal-item r${it.rarity}${i === palSel ? ' on' : ''}" data-i="${i}">` +
      `<span class="ico-wrap">${icoImg(it.name, it.kind === 'wpn' ? 'weapon' : 'char')}</span>` +
      `${esc(it.name)}` +
      `<span class="tag">${it.rarity}★ ${it.kind === 'wpn' ? 'weapon' : 'char'}</span>` +
    `</div>`).join('') : '<div class="empty">No matches.</div>';
  $('#palList').querySelectorAll('.pal-item').forEach(el => {
    el.addEventListener('click', () => palActivate(list[+el.dataset.i]));
    el.addEventListener('mousemove', () => {
      if(palSel !== +el.dataset.i){ palSel = +el.dataset.i; renderPal(); }
    });
  });
  bindIcons($('#palList'));
}
function palActivate(it){
  if(!it) return;
  closePal();
  state.goals.push(it.kind === 'wpn' ? newWpnGoal(it.id, true) : newGoal(it.id, true, state.defaults));
  save(); render();
}
$('#btnAdd').addEventListener('click', openPal);
$('#btnTpl').addEventListener('click', () => { closePal(); editTpl = 5; renderModal(); });
$('#palWrap').addEventListener('click', e => { if(e.target === e.currentTarget) closePal(); });
$('#palIn').addEventListener('input', () => { palSel = 0; renderPal(); });
$('#palIn').addEventListener('keydown', e => {
  const items = paletteEntries($('#palIn').value.trim());
  if(e.key === 'ArrowDown'){ e.preventDefault(); palSel = Math.min(palSel + 1, items.length - 1); renderPal(); }
  else if(e.key === 'ArrowUp'){ e.preventDefault(); palSel = Math.max(palSel - 1, 0); renderPal(); }
  else if(e.key === 'Enter'){ e.preventDefault(); palActivate(items[palSel]); }
});

/* ── summary panel ── */
let INVROWS = [];
const TABS = [['total','Total'], ['left','Inventory'], ['next','Farm next'], ['done','Completed']];

function invRow(id, needTxt, left){
  const i = INVROWS.push(id) - 1;
  const leftCell = left === undefined ? '<td class="qty"></td>'
    : `<td class="qty ${left ? 'short' : 'ok'}" data-l="${i}">${left ? fmt(left) : '✓'}</td>`;
  return `<tr><td>${matIco(id)}${esc(MATS[id].name)}</td>` +
         `<td class="qty">${needTxt}</td>` +
         `<td class="inv"><input type="number" min="0" step="1" class="invIn" data-i="${i}" value="${state.inv[id] ?? ''}" placeholder="0"></td>` +
         leftCell + '</tr>';
}

/* Inventory edits patch the computed cells in place instead of rebuilding the
   table — a full re-render would destroy the input the user is tabbing into
   and dump focus back to the top of the page. Row structure only depends on
   goals, never on inventory, so the patch set is fixed: Left cells (data-l,
   keyed by INVROWS index or 'exp'/'wexp'), pooled-EXP Have cells (data-h),
   and the potion/core plan rows (data-p). */
function updateLeft(){
  const res = remainingBag(totalBag(state.goals), state.inv, state.synth);
  const leftOf = k => k === 'exp' ? (res.rem.exp || 0)
                    : k === 'wexp' ? (res.rem.wexp || 0)
                    : (res.rem[INVROWS[+k]] || 0);
  const el = $('#summary');
  el.querySelectorAll('td[data-l]').forEach(td => {
    const left = leftOf(td.dataset.l);
    td.className = `qty ${left ? 'short' : 'ok'}`;
    td.textContent = left ? fmt(left) : '✓';
  });
  const have = {exp: fmt(res.invExp), wexp: fmt(res.invWexp)};
  el.querySelectorAll('td[data-h]').forEach(td => td.textContent = have[td.dataset.h]);
  const plans = {exp: potionText(res.potionPlan), wexp: coreText(res.corePlan)};
  el.querySelectorAll('tr[data-p]').forEach(tr => {
    const on = leftOf(tr.dataset.p) > 0;
    tr.style.display = on ? '' : 'none';
    tr.firstElementChild.textContent = on ? plans[tr.dataset.p] : '';
  });
}

function renderSummary(){
  $('#tabs').innerHTML = TABS.map(([k,l]) =>
    `<button class="${state.tab === k ? 'on' : ''}" data-t="${k}">${
      k === 'done' && state.done.length ? `${l} (${state.done.length})` : l}</button>`).join('');
  $('#tabs').querySelectorAll('button').forEach(b => b.addEventListener('click', e => {
    state.tab = e.currentTarget.dataset.t; save(); renderSummary();
  }));

  const el = $('#summary');

  if(state.tab === 'done'){
    el.innerHTML = state.done.length
      ? `<div class="gmeta" style="margin-bottom:8px">Finished builds — out of the queue and totals. ↩ returns one to the end of the queue (raise its target to keep going); ✕ forgets it.</div>` +
        state.done.map((g, i) => {
          const isWpn = g.weapon !== undefined;
          const it = isWpn ? GAME.weapons[g.weapon] : GAME.characters[g.char];
          const bg = isWpn ? `var(--r${it.rarity})` : it.elColor;
          let meta = `${it.rarity}★ · ${ORD_LABEL(g.tgt.ord)}`, chk = '';
          if(!isWpn){
            const sk = g.cur.skills;
            meta += ` · forte ${sk.every(v => v === sk[0]) ? 'all ' + sk[0] : sk.join('/')}`;
            const miss = nodeShortfall(g.cur, state.defaults[it.rarity]);
            const parts = [];
            if(miss.minor) parts.push(`${miss.minor} minor stat node${miss.minor > 1 ? 's' : ''}`);
            if(miss.major) parts.push(`${miss.major} major stat node${miss.major > 1 ? 's' : ''}`);
            if(miss.inh1) parts.push('Inherent Ⅰ');
            if(miss.inh2) parts.push('Inherent Ⅱ');
            chk = `<span class="nodechk${parts.length ? '' : ' on'}" title="${esc(parts.length
              ? `Below the ${it.rarity}★ template's node plan: ${parts.join(' · ')}`
              : `Owned forte nodes cover the ${it.rarity}★ template's plan`)}"></span>`;
          }
          return `<div class="goalstat" style="--acc:${isWpn ? 'var(--weapon)' : it.elColor}">` +
            `<span class="avatar" style="background:${bg};width:24px;height:24px;font-size:10px;border-radius:6px">${it.mono}${icoImg(it.name, isWpn ? 'weapon' : 'char', 'avatar-img')}</span>` +
            `<strong>${esc(it.name)}</strong><span class="gmeta">${meta}</span>${chk}` +
            `<span class="st ready">DONE</span>` +
            `<button class="tiny" data-undone="${i}" title="Return to the end of the queue">↩</button>` +
            `<button class="tiny danger" data-rmdone="${i}" title="Forget — the character becomes addable again">✕</button></div>`;
        }).join('')
      : '<div class="empty">Nothing completed yet — when a goal needs nothing, its card grows a ✓ button.</div>';
    el.querySelectorAll('[data-undone]').forEach(b => b.addEventListener('click', e => {
      state.goals.push(state.done.splice(+e.currentTarget.dataset.undone, 1)[0]);
      save(); render();
    }));
    el.querySelectorAll('[data-rmdone]').forEach(b => b.addEventListener('click', e => {
      state.done.splice(+e.currentTarget.dataset.rmdone, 1);
      save(); render();
    }));
    bindIcons(el);
    return;
  }

  // the Inventory tab is a full stock editor, so it renders even with no goals
  if(!state.goals.length && state.tab !== 'left'){ el.innerHTML = '<div class="empty">Add a goal to see totals.</div>'; return; }
  const need = totalBag(state.goals);

  if(state.tab === 'total'){
    const res = remainingBag(need, state.inv, state.synth);
    el.innerHTML = `<div class="gmeta" style="margin-bottom:8px">Everything still needed for ${state.goals.length} goal${state.goals.length > 1 ? 's' : ''} after inventory — ordered by queue priority. Hover a tile for exact amounts.</div>` +
      (deficitTiles(need, res.rem, priorityMatIds(state.goals)) || '<div class="empty">All targets already met.</div>');
    bindIcons(el);
    return;
  }

  if(state.tab === 'left'){
    const res = remainingBag(need, state.inv, state.synth);
    INVROWS = [];
    const head = `<label class="chk" style="margin-bottom:8px"><input type="checkbox" id="synthChk"${state.synth ? ' checked' : ''}> Craft surplus 3→1 within material families</label>` +
      `<label class="chk" style="margin-bottom:8px;margin-left:14px"><input type="checkbox" id="hideChk"${state.hideUn ? ' checked' : ''}> Hide un-needed</label>`;
    let html = `<table class="mats"><tr>
      <td style="color:var(--faint)">Material</td><td class="qty" style="color:var(--faint)">Need</td>
      <td class="inv" style="color:var(--faint)">Have</td><td class="qty" style="color:var(--faint)">Left</td></tr>`;
    // every material is listed (not just needed ones) so stock can be logged
    // ahead of goals; un-needed rows show '—' and no Left cell. "Hide
    // un-needed" collapses the catalog to the needed set — row visibility
    // still depends only on goals + the toggle, never on inventory, so
    // updateLeft() can keep patching in place.
    const poolRow = (dotColor, label, needQty, haveQty, left, key, plan) =>
      `<tr><td><span class="dot" style="color:${dotColor}"></span>${label}</td>` +
      `<td class="qty">${fmt(needQty)}</td><td class="inv" style="color:var(--faint);padding-right:8px" data-h="${key}">${fmt(haveQty)}</td>` +
      `<td class="qty ${left ? 'short' : 'ok'}" data-l="${key}">${left ? fmt(left) : '✓'}</td></tr>` +
      `<tr data-p="${key}"${left ? '' : ' style="display:none"'}><td colspan="4" style="color:var(--faint);font-size:12px;padding-left:16px">${left ? plan : ''}</td></tr>`;
    const allIds = sortMatIds(Object.keys(MATS));
    for(const cat of CATEGORY_ORDER){
      if(cat === 'EXP'){
        const showPot = !state.hideUn || !!need.exp, showCore = !state.hideUn || !!need.wexp;
        if(!showPot && !showCore) continue;
        html += catRow(cat, 4);
        if(showPot){
          for(const it of [...GAME.expItems].reverse()) html += invRow(it.id, '—');
          if(need.exp) html += poolRow('var(--cyan)', 'Resonator EXP', need.exp, res.invExp,
                                       res.rem.exp || 0, 'exp', potionText(res.potionPlan));
        }
        if(showCore){
          for(const it of [...GAME.wpnExpItems].reverse()) html += invRow(it.id, '—');
          if(need.wexp) html += poolRow('var(--vio)', 'Weapon EXP', need.wexp, res.invWexp,
                                        res.rem.wexp || 0, 'wexp', coreText(res.corePlan));
        }
        continue;
      }
      const ids = allIds.filter(id => MATS[id].cat === cat && (!state.hideUn || need[id]));
      if(!ids.length) continue;
      html += catRow(cat, 4);
      for(const id of ids)
        html += need[id] ? invRow(id, fmt(need[id]), res.rem[id] || 0) : invRow(id, '—');
    }
    html += '</table>';
    el.innerHTML = head + (INVROWS.length ? html
      : '<div class="empty">Nothing needed right now — untick “Hide un-needed” to log stock for later.</div>');
    el.querySelectorAll('.invIn').forEach(inp => inp.addEventListener('change', e => {
      const id = INVROWS[+e.currentTarget.dataset.i];
      const v = Math.max(0, Math.floor(+e.currentTarget.value || 0));
      if(v) state.inv[id] = v; else delete state.inv[id];
      e.currentTarget.value = v || '';
      save(); updateLeft();
    }));
    const chk = $('#synthChk');
    if(chk) chk.addEventListener('change', e => { state.synth = e.currentTarget.checked; save(); updateLeft(); });
    // hiding changes row structure, so this one is a real re-render
    const hid = $('#hideChk');
    if(hid) hid.addEventListener('change', e => { state.hideUn = e.currentTarget.checked; save(); renderSummary(); });
    bindIcons(el);
    return;
  }

  // Farm next
  const walk = farmNextWalk(state.goals, state.inv);
  let html = '<div class="gmeta" style="margin-bottom:8px">Inventory is spent top-down in queue order — this is what the top unmet goal still needs.</div>';
  let expanded = false;
  walk.forEach((w, i) => {
    const isWpn = w.goal.weapon !== undefined;
    const ch = isWpn ? GAME.weapons[w.goal.weapon] : GAME.characters[w.goal.char];
    const bg = isWpn ? `var(--r${ch.rarity})` : ch.elColor;
    const missN = Object.keys(w.rem).length;
    html += `<div class="goalstat" style="--acc:${isWpn ? 'var(--weapon)' : ch.elColor}"><span class="prio">P${i+1}</span>` +
      `<span class="avatar" style="background:${bg};width:24px;height:24px;font-size:10px;border-radius:6px">${ch.mono}${icoImg(ch.name, isWpn ? 'weapon' : 'char', 'avatar-img')}</span>` +
      `<strong>${esc(ch.name)}</strong><span class="gmeta">→ ${ORD_LABEL(w.goal.tgt.ord)}</span>` +
      `<span class="st ${w.ready ? 'ready' : 'miss'}">${w.ready ? 'READY' : 'MISSING ' + missN}</span></div>`;
    if(!w.ready && !expanded){
      expanded = true;
      html += `<div style="margin:2px 0 14px">${matTiles(w.rem)}</div>`;
    }
  });
  html += '<div style="color:var(--faint);font-size:11.5px;margin-top:6px">Crafting isn’t applied in this view, so tier surpluses stay reserved for lower-priority goals.</div>';
  el.innerHTML = html;
  bindIcons(el);
}

/* ── edit pop-up ──
   editIdx is transient UI state (never persisted). Live-apply: the modal's
   selects and node buttons reuse onField/onNode, which save() + render();
   render() re-renders the open modal in place. */
let editIdx = null;
let editTpl = null;                          // 4 | 5 → pop-up edits state.defaults[editTpl]
function closeEdit(){ editIdx = null; editTpl = null; renderModal(); }
function renderModal(){
  const wrap = $('#modalWrap');
  if(editTpl !== null){ renderTplModal(wrap); return; }
  if(editIdx === null || !state.goals[editIdx]){
    editIdx = null; wrap.hidden = true;
    $('#modalBox').innerHTML = '';          // stale content would ghost into global queries
    return;
  }
  const g = state.goals[editIdx], i = editIdx;
  const isW = g.weapon !== undefined;
  const it = isW ? GAME.weapons[g.weapon] : GAME.characters[g.char];
  let html = `<div class="modal-h">
      <span class="avatar" style="background:${isW ? `var(--r${it.rarity})` : it.elColor}">${it.mono}${icoImg(it.name, isW ? 'weapon' : 'char', 'avatar-img')}</span>
      <div><div class="gname">${esc(it.name)}</div>
        <div class="gmeta">${isW ? it.rarity + '★ ' + it.wtype + ' weapon' : it.rarity + '★ ' + it.element + ' · ' + it.wtype}</div></div>
      <button class="tiny close" data-close title="Close">✕</button>
    </div>
    <div class="grid-ct">${ctrlRow('Level', i, 'ord', ordOpts, g)}</div>`;
  if(!isW){
    // game-view forte layout: each skill column carries its two nodes above
    // its level selects (current above target); column c ↔ skill c
    const m = g.nodes, SHORT = ['Basic','Skill','Circuit','Lib','Intro'];
    // per-skill ± pair rendered under each select (current and target rows)
    const skpm = (c, side) => `<div class="skpm">` +
      `<button data-skc="${c}" data-sks="${side}" data-skd="-1" title="${esc(GAME.skillNames[c])} ${side === 'cur' ? 'current' : 'target'} −1">−</button>` +
      `<button data-skc="${c}" data-sks="${side}" data-skd="1" title="${esc(GAME.skillNames[c])} ${side === 'cur' ? 'current' : 'target'} +1">+</button>` +
    `</div>`;
    // ±1 gutters flank the select rows: left = −1, right = +1; the upper
    // button works the current row, the lower one the target row
    const gutter = (key, label) => `<div class="fcol gut">` +
      `<button class="tiny" data-bulk="cur${key}" title="All current skill levels ${label}">${label}</button>` +
      `<span class="skspace"></span>` +
      `<span class="arrow-v">&nbsp;</span>` +
      `<button class="tiny" data-bulk="tgt${key}" title="All target skill levels ${label}">${label}</button>` +
      `<span class="skspace"></span>` +
    `</div>`;
    html += `<div class="ftree medit">` + gutter('-', '−1') + [0,1,2,3,4].map(c => `<div class="fcol">` +
        nodeBtn(i, 1, c, m[1][c], c === INH_COL ? 'Ⅱ' : '') +
        `<span class="link${m[1][c] === 2 ? ' own' : m[1][c] === 1 ? ' plan' : ''}"></span>` +
        nodeBtn(i, 0, c, m[0][c], c === INH_COL ? 'Ⅰ' : '') +
        `<div class="sklbl" title="${esc(GAME.skillNames[c])}">${SHORT[c]}</div>` +
        sel(i, 'cur', 's'+c, skOpts, g.cur.skills[c]) +
        skpm(c, 'cur') +
        `<span class="arrow-v">↓</span>` +
        sel(i, 'tgt', 's'+c, skOpts, g.tgt.skills[c]) +
        skpm(c, 'tgt') +
      `</div>`).join('') + gutter('+', '+1') + `</div>`;
  }
  html += `<div style="display:flex; gap:8px; margin-top:16px; flex-wrap:wrap">
    <button class="tiny" data-max title="Target → Lv 90${isW ? '' : ', all skills 10, every node &amp; passive planned'}">⤒ Max target</button>
    <button class="tiny good" data-maxgoal title="Current → target${isW ? '' : ': levels, skills, and every planned node becomes owned'} — the card then offers ✓ Mark completed">✓ Max goal</button>
  </div>`;
  const box = $('#modalBox');
  box.style.setProperty('--acc', isW ? 'var(--weapon)' : it.elColor);
  box.innerHTML = html;
  box.querySelectorAll('select[data-f]').forEach(s => s.addEventListener('change', onField));
  box.querySelectorAll('.node').forEach(b => ['click','contextmenu','dblclick']
    .forEach(t => b.addEventListener(t, onNode)));
  box.querySelector('[data-close]').addEventListener('click', closeEdit);
  box.querySelectorAll('[data-bulk]').forEach(b => b.addEventListener('click', e => {
    const which = e.currentTarget.dataset.bulk;              // cur-/cur+/tgt-/tgt+
    const delta = which.endsWith('+') ? 1 : -1;
    for(let s2 = 0; s2 < 5; s2++){
      if(which.startsWith('cur')){
        g.cur.skills[s2] = clamp(g.cur.skills[s2] + delta, 1, 10);
        g.tgt.skills[s2] = Math.max(g.tgt.skills[s2], g.cur.skills[s2]);  // same rule as onField
      } else {
        g.tgt.skills[s2] = clamp(g.tgt.skills[s2] + delta, 1, 10);
        g.cur.skills[s2] = Math.min(g.cur.skills[s2], g.tgt.skills[s2]);
      }
    }
    save(); render();
  }));
  // Max target: everything into the target — Lv90, skills 10, every node
  // (incl. both passives — col 2 of the matrix) at least planned
  box.querySelector('[data-max]').addEventListener('click', () => {
    g.tgt.ord = 13;
    if(!isW){
      g.tgt.skills = [10,10,10,10,10];
      for(let r2=0; r2<2; r2++) for(let c2=0; c2<5; c2++) g.nodes[r2][c2] = Math.max(g.nodes[r2][c2], 1);
      syncNodeCounts(g);
    }
    save(); render();
  });
  // Max goal: current snaps to target (the backlog "set current = target"
  // quick action) — planned nodes flip to owned, skipped ones stay skipped;
  // the goal then costs nothing and its card offers ✓ Mark completed
  box.querySelector('[data-maxgoal]').addEventListener('click', () => {
    g.cur.ord = g.tgt.ord;
    if(!isW){
      g.cur.skills = [...g.tgt.skills];
      g.nodes = g.nodes.map(row => row.map(v => v === 1 ? 2 : v));
      syncNodeCounts(g);
    }
    save(); render();
  });
  box.querySelectorAll('[data-skc]').forEach(b => b.addEventListener('click', e => {
    const c2 = +e.currentTarget.dataset.skc, delta = +e.currentTarget.dataset.skd;
    if(e.currentTarget.dataset.sks === 'cur'){                          // same rules as onField
      g.cur.skills[c2] = clamp(g.cur.skills[c2] + delta, 1, 10);
      g.tgt.skills[c2] = Math.max(g.tgt.skills[c2], g.cur.skills[c2]);
    } else {
      g.tgt.skills[c2] = clamp(g.tgt.skills[c2] + delta, 1, 10);
      g.cur.skills[c2] = Math.min(g.cur.skills[c2], g.tgt.skills[c2]);
    }
    save(); render();
  }));
  bindIcons(box);
  wrap.hidden = false;
}
/* ── template editor: same pop-up shell, edits state.defaults[4|5] ──
   Templates are target-only, so nodes just toggle skip ↔ planned (no
   "owned"), and each column has a single target-level select. Node
   positions collapse to counts — every stat node costs the same. */
function renderTplModal(wrap){
  const r = editTpl, t = state.defaults[r];
  const seq = n => [0,1,2,3].map(k => k < n ? 1 : 0);
  const mi = seq(t.minor), ma = seq(t.major);
  const m = [[mi[0], mi[1], t.inh1 ? 1 : 0, mi[2], mi[3]],
             [ma[0], ma[1], t.inh2 ? 1 : 0, ma[2], ma[3]]];
  const st = v => v ? ' plan' : '';
  const SHORT = ['Basic','Skill','Circuit','Lib','Intro'];
  const other = r === 5 ? 4 : 5;
  const html = `<div class="modal-h">
      <span class="avatar" style="background:var(--r${r})">${r}★</span>
      <div><div class="gname">${r}★ default goal</div>
        <div class="gmeta">the target new ${r}★ character goals start with</div></div>
      <button class="tiny" data-tplswitch="${other}" title="Edit the ${other}★ template">Edit ${other}★</button>
      <button class="tiny close" data-close title="Close">✕</button>
    </div>
    <div class="grid-ct"><span class="lbl">Target level</span>
      <select data-tf="ord">${ORDS.map(o => `<option value="${o}"${o === t.ord ? ' selected' : ''}>${ORD_LABEL(o)}</option>`).join('')}</select>
    </div>
    <div class="ftree medit">` + [0,1,2,3,4].map(c => `<div class="fcol">` +
      `<button type="button" class="node ${c === INH_COL ? 'inh' : 'major'}${st(m[1][c])}" data-tr="1" data-tc="${c}" title="${c === INH_COL ? 'Inherent Ⅱ' : 'Major stat node'} — click to toggle">${c === INH_COL ? 'Ⅱ' : ''}</button>` +
      `<span class="link${st(m[1][c])}"></span>` +
      `<button type="button" class="node ${c === INH_COL ? 'inh' : 'minor'}${st(m[0][c])}" data-tr="0" data-tc="${c}" title="${c === INH_COL ? 'Inherent Ⅰ' : 'Minor stat node'} — click to toggle">${c === INH_COL ? 'Ⅰ' : ''}</button>` +
      `<div class="sklbl" title="${esc(GAME.skillNames[c])}">${SHORT[c]}</div>` +
      `<select data-tf="s${c}">${[...Array(10).keys()].map(k => `<option value="${k+1}"${k+1 === t.skills[c] ? ' selected' : ''}>${k+1}</option>`).join('')}</select>` +
    `</div>`).join('') + `</div>
    <div class="ftree-legend">click a node to plan / skip it · upper nodes need their lower node</div>
    <div style="display:flex; gap:8px; margin-top:16px">
      <button class="tiny" data-tplreset title="Restore the built-in ${r}★ template">Reset to built-in</button>
    </div>`;
  const box = $('#modalBox');
  box.style.setProperty('--acc', 'var(--cyan)');
  box.innerHTML = html;
  box.querySelector('[data-close]').addEventListener('click', closeEdit);
  box.querySelector('[data-tplswitch]').addEventListener('click', e => { editTpl = +e.currentTarget.dataset.tplswitch; renderModal(); });
  box.querySelector('[data-tplreset]').addEventListener('click', () => { state.defaults[r] = defaultGoalTgt(r); save(); render(); });
  box.querySelectorAll('select[data-tf]').forEach(s3 => s3.addEventListener('change', e => {
    const f = e.currentTarget.dataset.tf, v = Math.floor(+e.currentTarget.value) || 0;
    if(f === 'ord') t.ord = clamp(v, 0, 13);
    else t.skills[+f[1]] = clamp(v, 1, 10);
    save(); render();
  }));
  box.querySelectorAll('.node').forEach(b => b.addEventListener('click', e => {
    const r2 = +e.currentTarget.dataset.tr, c2 = +e.currentTarget.dataset.tc;
    m[r2][c2] = m[r2][c2] ? 0 : 1;
    if(r2 === 1 && m[1][c2]) m[0][c2] = 1;      // planning the top plans the bottom
    if(r2 === 0 && !m[0][c2]) m[1][c2] = 0;     // skipping the bottom skips the top
    t.minor = STAT_COLS.filter(c3 => m[0][c3]).length;
    t.major = STAT_COLS.filter(c3 => m[1][c3]).length;
    t.inh1 = m[0][INH_COL] ? 1 : 0;
    t.inh2 = m[1][INH_COL] ? 1 : 0;
    save(); render();
  }));
  wrap.hidden = false;
}

$('#modalWrap').addEventListener('click', e => { if(e.target === e.currentTarget) closeEdit(); });
document.addEventListener('keydown', e => {
  if((e.ctrlKey || e.metaKey) && (e.key === 'k' || e.key === 'K')){ e.preventDefault(); openPal(); return; }
  if(e.key === 'Escape'){
    if(palIsOpen()) closePal();
    else if(editIdx !== null || editTpl !== null) closeEdit();
  }
});

/* ── toolbar: export / import / reset ── */
$('#btnExport').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify({v:1, ...state}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wuwa-planner-save.json';
  a.click();
  URL.revokeObjectURL(a.href);
});
$('#btnImport').addEventListener('click', () => $('#fileImport').click());
$('#fileImport').addEventListener('change', e => {
  const f = e.currentTarget.files[0];
  if(!f) return;
  const rd = new FileReader();
  rd.onload = () => {
    try{ state = sanitize(JSON.parse(rd.result)); save(); render(); }
    catch(err){ note('Import failed — that file isn’t a valid planner save.', true); }
  };
  rd.readAsText(f);
  e.currentTarget.value = '';
});
$('#btnReset').addEventListener('click', () => {
  if(confirm('Clear all goals and inventory?')){ state = defaultState(); save(); render(); }
});

/* ── footer & boot ── */
function renderFooter(){
  $('#footer').innerHTML =
    '<span class="pill">cost tables · v3.4 game config</span>' +
    '<span class="pill">Suisui · 3.5 beta data</span>' +
    `<span class="pill">${storageOK ? 'autosaves · this browser' : 'preview · no autosave'}</span><br>` +
    'To add a new patch character or weapon, edit the <b>GAME.characters</b> / <b>GAME.weapons</b> blocks near ' +
    'the top of this file — one small entry each; the shared cost templates do the rest. Suisui’s material names follow ' +
    '3.5 beta info and may shift at launch. Weekly-boss materials can’t be crafted, so plan those runs first. ' +
    '<b>Icons:</b> place an “images” folder (with characters/, materials/, weapons/ subfolders) next to this ' +
    'file, files named like <b>lf_howler_core_icon.png</b> — see the GAME.icons comment for the full convention; anything missing ' +
    'falls back to the colored markers. Click ✎ on a card to edit levels, skills, and forte nodes in a pop-up; ' +
    'cards themselves are read-only status views. Drag the ⠿ grip to reorder goals (▲▼ still work, and are the way to go on touch screens).';
}
function render(){ renderGoals(); renderSummary(); renderFooter(); renderModal(); }
render();
if(storageOK){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}  // normalize any old/corrupt save
  note('Autosaves in this browser · Export for a portable backup.');
} else {
  note('Preview mode — autosave unavailable here. Download this file and open it locally (or use Export) to keep changes.', true);
}
</script>
</body>
